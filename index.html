<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球数据实时看 · 仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .data-card { transition: all 0.2s; }
        .data-card:hover { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .disclaimer { background: #fff3cd; border-left: 4px solid #ffe093; }
        .badge-live { background: #ef4444; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 免责声明（显著） -->
        <div class="disclaimer p-4 mb-6 rounded text-sm text-amber-800">
            <strong>📢 重要提示：</strong> 本页面展示的所有数据（包括比分、赔率、统计）均来自公开API，<span class="font-bold">仅供参考，不构成任何投注建议。</span> 请理性看待体育赛事，切勿沉迷。
        </div>

        <!-- 标题和更新时间 -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">⚽ 实时足球数据仪表盘</h1>
            <span class="text-sm bg-green-100 text-green-700 px-3 py-1 rounded-full" id="update-time">加载中...</span>
        </div>

        <!-- 数据卡片容器 -->
        <div id="matches-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <div class="text-center py-10 col-span-full text-gray-400">正在获取实时数据...</div>
        </div>
    </div>

    <script>
        fetch('/api/matches')
            .then(res => res.json())
            .then(data => {
                document.getElementById('update-time').innerText = `更新于 ${new Date().toLocaleString('zh-CN')}`;
                
                const container = document.getElementById('matches-container');
                if (!data.matches || data.matches.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 col-span-full text-gray-400">今日暂无比赛</div>';
                    return;
                }

                let html = '';
                data.matches.forEach(m => {
                    const isLive = m.status === 'LIVE' || m.status === '1H' || m.status === '2H' || m.status === 'HT';
                    const statusBadge = isLive 
                        ? '<span class="badge-live text-xs px-2 py-1 rounded-full">LIVE</span>' 
                        : `<span class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-full">${m.status}</span>`;

                    html += `
                        <div class="data-card bg-white rounded-xl shadow-sm p-5 border border-gray-200">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-full">${m.league}</span>
                                ${statusBadge}
                            </div>
                            <div class="flex items-center justify-between mt-2">
                                <div class="text-center w-5/12">
                                    <div class="font-semibold text-gray-800">${m.homeTeam}</div>
                                </div>
                                <div class="text-center w-2/12 font-bold text-xl text-indigo-600">${m.score}</div>
                                <div class="text-center w-5/12">
                                    <div class="font-semibold text-gray-800">${m.awayTeam}</div>
                                </div>
                            </div>
                            <!-- 控球率 -->
                            <div class="mt-3 flex justify-between text-xs text-gray-500">
                                <span>控球: ${m.homePossession}</span>
                                <span>控球: ${m.awayPossession}</span>
                            </div>
                            <!-- 赔率 -->
                            <div class="mt-4 pt-3 border-t border-gray-100">
                                <div class="text-xs text-gray-400 mb-1">赛前平均赔率</div>
                                <div class="grid grid-cols-3 gap-1 text-center">
                                    <div class="bg-gray-50 p-1 rounded">
                                        <span class="block text-xs text-gray-500">主胜</span>
                                        <span class="font-mono text-sm">${m.odds.home}</span>
                                    </div>
                                    <div class="bg-gray-50 p-1 rounded">
                                        <span class="block text-xs text-gray-500">平局</span>
                                        <span class="font-mono text-sm">${m.odds.draw}</span>
                                    </div>
                                    <div class="bg-gray-50 p-1 rounded">
                                        <span class="block text-xs text-gray-500">客胜</span>
                                        <span class="font-mono text-sm">${m.odds.away}</span>
                                    </div>
                                </div>
                            </div>
                            <!-- 额外提示：赔率仅供参考 -->
                            <p class="text-[10px] text-gray-300 text-right mt-1">*赔率数据为实时采集，仅供参考</p>
                        </div>
                    `;
                });
                container.innerHTML = html;
            })
            .catch(err => {
                console.error(err);
                document.getElementById('matches-container').innerHTML = '<div class="text-center py-10 col-span-full text-red-500">数据加载失败，请刷新页面</div>';
            });
    </script>
</body>
</html>
